name: Package Web Client

on:
  push:
    branches:
      - main
    paths:
      - "webclient/**"
      - ".github/workflows/build.webclient.yml"
      - ".github/workflows/package.webclient.yml"

jobs:
  build:
    uses: ./.github/workflows/build.webclient.yml

  package:
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: webclient

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          package_json_file: webclient/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"
          cache-dependency-path: webclient/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Build Docker Image
        run: docker build -t webclient:latest .

      - name: Save Docker Image
        run: docker save webclient:latest -o webclient-latest.tar

      - name: Upload Docker Image
        uses: actions/upload-artifact@v6
        with:
          name: docker-image-latest
          path: webclient-latest.tar
          if-no-files-found: error
